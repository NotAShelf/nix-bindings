name: Backport

on:
  pull_request_target:
    types: [closed, labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

jobs:
  backport:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'pull_request_target' && github.event.pull_request.merged) && (
        (github.event.action == 'labeled' && startsWith(github.event.label.name, 'backport ')) ||
        (github.event.action == 'closed' && contains(join(github.event.pull_request.labels.*.name, ' '), 'backport '))
      ) || (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        github.event.comment.user.id != 97796249 &&
        startsWith(github.event.comment.body, '/backport')
      )
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.merge_commit_sha || github.ref }}
          fetch-depth: 0

      - name: Create backport PRs
        uses: korthout/backport-action@v4.5.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          add_author_as_reviewer: true
          pull_description: |-
            Automated backport of #${pull_number} to `${target_branch}`.

            Verify that this PR applies cleanly and passes CI before merging.
