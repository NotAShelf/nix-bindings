name: Publish

on:
  push:
    tags: ["v*"]
    branches: ["release/*"]

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  skip:
    if: ${{ !startsWith(github.ref, 'refs/tags/v') && !startsWith(github.ref, 'refs/heads/release/') }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "Not a release branch push or version tag, skipping"

  tag:
    if: startsWith(github.ref, 'refs/heads/release/') && startsWith(github.event.head_commit.message, 'Merge pull request #')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PUBLISH_PAT }}
      - uses: cachix/install-nix-action@v31.10.5
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read current version
        id: version
        run: |
          eval "$(nix print-dev-env)"
          ver="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "nix-bindings-sys") | .version')"
          echo "current=$ver" >> "$GITHUB_OUTPUT"

      - name: Tag release
        env:
          CURRENT_VER: ${{ steps.version.outputs.current }}
        run: |
          if git rev-parse "v${CURRENT_VER}" >/dev/null 2>&1; then
            echo "Tag v${CURRENT_VER} already exists, skipping"
          else
            git tag "v${CURRENT_VER}"
            git push origin "v${CURRENT_VER}"
          fi

      - name: Bump patch for next release
        env:
          CURRENT_VER: ${{ steps.version.outputs.current }}
        run: |
          ver="${CURRENT_VER}"
          major=$(echo "$ver" | cut -d. -f1)
          minor=$(echo "$ver" | cut -d. -f2)
          patch=$(echo "$ver" | cut -d. -f3)
          next="$major.$minor.$((patch + 1))"
          if grep -q "\"$next\"" Cargo.toml; then
            echo "Already at $next, skipping bump"
            exit 0
          fi
          sed -i "s/\"$ver\"/\"$next\"/g" Cargo.toml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "release: bump version to $next"
          git push

  verify:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31.10.5
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify tag matches crate version
        run: |
          eval "$(nix print-dev-env)"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CRATE_VERSION="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "nix-bindings-sys") | .version')"
          if [ "$TAG_VERSION" != "$CRATE_VERSION" ]; then
            echo "Tag v${TAG_VERSION} does not match crate version ${CRATE_VERSION}"
            exit 1
          fi
          echo "version=${CRATE_VERSION}" >> "$GITHUB_OUTPUT"
        id: check

    outputs:
      version: ${{ steps.check.outputs.version }}

  test:
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31.10.5
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tests
        run: |
          eval "$(nix print-dev-env)"
          cargo nextest run -p nix-bindings-sys

  publish:
    needs: [verify, test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31.10.5
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cargo login
        run: |
          eval "$(nix print-dev-env)"
          echo "${{ secrets.CARGO_REGISTRY_TOKEN }}" | cargo login

      - name: Publish nix-bindings-sys
        run: |
          eval "$(nix print-dev-env)"
          cargo publish -p nix-bindings-sys

      - name: Wait for nix-bindings-sys to be indexed
        env:
          SYNC_VER: ${{ needs.verify.outputs.version }}
        run: |
          eval "$(nix print-dev-env)"
          for i in $(seq 1 20); do
            if cargo search nix-bindings-sys 2>/dev/null | grep -q "\"${SYNC_VER}\""; then
              echo "nix-bindings-sys ${SYNC_VER} is indexed"
              exit 0
            fi
            echo "Waiting for indexing (attempt $i)…"
            sleep 15
          done
          echo "Timed out waiting for nix-bindings-sys ${SYNC_VER} to be indexed"
          exit 1

      - name: Publish nix-bindings
        run: |
          eval "$(nix print-dev-env)"
          cargo publish -p nix-bindings

  create-release-branch:
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.PUBLISH_PAT }}

      - name: Create release branch and bump patch
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          MAJOR_MINOR="${VERSION%.*}"
          BRANCH="release/v${MAJOR_MINOR}"

          if git ls-remote --heads origin "$BRANCH" | grep -q "refs/heads/${BRANCH}$"; then
            echo "Branch $BRANCH already exists, skipping"
            exit 0
          fi

          git checkout -b "$BRANCH"

          PATCH="${VERSION##*.}"
          NEXT="${MAJOR_MINOR}.$((PATCH + 1))"
          sed -i "s/\"$VERSION\"/\"$NEXT\"/g" Cargo.toml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: bump version to $NEXT"
          git push -u origin "$BRANCH"
